services:
  postgres:
    image: postgres:17-alpine
    ports:
      # 5433 on the host: many machines already run a native Postgres on 5432
      - "5433:5432"
    environment:
      POSTGRES_USER: capca
      POSTGRES_PASSWORD: capca
      POSTGRES_DB: capca
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: capca
      MINIO_ROOT_PASSWORD: capca
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
