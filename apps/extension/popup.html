<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Capca</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <span class="logo"><span></span></span>
        <div class="titles">
          <h1>Capca</h1>
          <p id="status">Ready to record</p>
        </div>
        <span class="badge" id="badge">Capca Cloud</span>
      </header>

      <div class="rows">
        <div class="row">
          <span class="row-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="13" rx="2" />
              <path d="M8 21h8" />
              <path d="M12 17v4" />
            </svg>
          </span>
          <span class="row-label">Screen</span>
          <span class="row-value" id="screen-status">Ready</span>
        </div>

        <button class="row" id="mic-toggle" type="button">
          <span class="row-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="2" width="6" height="12" rx="3" />
              <path d="M5 10a7 7 0 0 0 14 0M12 19v3" />
            </svg>
          </span>
          <span class="row-label">Microphone</span>
          <span class="row-value" data-value>On</span>
        </button>

        <button class="row" id="camera-toggle" type="button">
          <span class="row-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="m16 13 5.2 3.1a.6.6 0 0 0 .8-.5V8.4a.6.6 0 0 0-.8-.5L16 11" />
              <rect x="2" y="6" width="14" height="12" rx="2" />
            </svg>
          </span>
          <span class="row-label">Camera</span>
          <span class="row-value" data-value>On</span>
        </button>

        <div class="row">
          <span class="row-icon" id="destination-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8.2 4.5h7.6l5 8.7-3.8 6.3H7L3.2 13.2z" />
              <path d="m8.2 4.5 5.1 8.7" />
              <path d="M3.2 13.2h10.1" />
              <path d="m15.8 4.5-5 8.7" />
            </svg>
          </span>
          <span class="row-label">Destination</span>
          <select id="destination" class="row-select">
            <option value="capca">Capca Cloud</option>
            <option value="drive">Google Drive</option>
            <option value="local">This device</option>
          </select>
        </div>
      </div>

      <label class="check">
        <input id="keep-local" type="checkbox" />
        <span>Always save a local copy</span>
      </label>

      <div class="actions">
        <button id="primary" type="button">
          <span>Start recording</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14m-6-6 6 6-6 6" />
          </svg>
        </button>
        <button id="open-controls" type="button">Show controls</button>
      </div>

      <div class="progress" id="progress" hidden>
        <div class="progress-head">
          <span id="progress-label">Saving to Capca Cloud</span>
          <span id="progress-value">0 MB</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <p id="message" role="status"></p>
    </main>
    <script src="shared-config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
