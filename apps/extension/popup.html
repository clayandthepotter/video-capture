<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Capca</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <span class="logo"><span></span></span>
        <div>
          <h1>Capca</h1>
          <p id="status">Ready to record</p>
        </div>
      </header>

      <p class="help">
        Choose a tab, window, or screen in Chrome's picker. For Meet, choose the
        Meet tab and keep "Also share tab audio" enabled.
      </p>

      <label class="check">
        <input id="mic" type="checkbox" checked />
        <span>Microphone</span>
      </label>

      <label class="check">
        <input id="camera" type="checkbox" checked />
        <span>Show camera bubble on page</span>
      </label>

      <label class="check">
        <input id="keep-local" type="checkbox" />
        <span>Always save a local copy</span>
      </label>
      <p class="hint">
        Downloads every recording to your computer in addition to the upload —
        your recording is safe even if the network fails.
      </p>

      <div class="actions">
        <button id="primary" type="button">Start recording</button>
        <button id="open-controls" type="button">Show controls</button>
      </div>

      <p id="message" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
